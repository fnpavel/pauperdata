name: Drive Data Sync Pipeline

on:
  schedule:
    - cron: "*/30 * * * 4,5,6,0,1"
  workflow_dispatch:
    inputs:
      pipeline_command:
        description: Pipeline command to run
        required: false
        default: sync

permissions:
  contents: write

concurrency:
  group: drive-data-sync-pipeline
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/automatedpipeline/requirements.txt

      - name: Install Node dependencies
        run: npm ci --prefix scripts

      - name: Install Playwright browser
        run: npx --prefix scripts playwright install --with-deps chromium

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run automated pipeline
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          DISCORD_WEBHOOKS: ${{ secrets.DISCORD_WEBHOOKS }}
          PIPELINE_COMMAND: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pipeline_command || 'sync' }}
          PIPELINE_REMOTE: origin
          PIPELINE_DATA_BRANCH: data-updates
          PIPELINE_MAIN_BRANCH: ${{ github.event.repository.default_branch }}
        run: python scripts/automatedpipeline/run_github_action_pipeline.py
