name: Drive Data Sync Pipeline

on:
  schedule:
    - cron: "*/30 * * * 5,6,0,1"  
    - cron: "0 */3 * * 2-4"
  workflow_dispatch:
    inputs:
      run_inspect:
        description: Run both Drive and local inspect commands
        required: false
        type: boolean
        default: true
      run_sync:
        description: Run the current sync and rebuild pipeline
        required: false
        type: boolean
        default: true
      run_full_rebuild:
        description: Run a full local rebuild from the archived workbooks
        required: false
        type: boolean
        default: false
      max_workbooks:
        description: Optional limit for validation runs, for example 5
        required: false
        default: ""
      drive_list_command:
        description: Drive inspect command
        required: false
        default: list --drive --limit 10
      local_list_command:
        description: Local inspect command
        required: false
        default: list --latest --limit 10
      run_publish:
        description: Commit and push generated changes
        required: false
        type: boolean
        default: false
      run_discord_notification:
        description: Send Discord notification on successful publish
        required: false
        type: boolean
        default: false
      upload_debug_artifact:
        description: Upload generated outputs for inspection
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: drive-data-sync-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Prepare data-updates branch
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          PIPELINE_REMOTE: origin
          PIPELINE_DATA_BRANCH: data-updates
          PIPELINE_MAIN_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euxo pipefail
          python pipeline/prepare_publish_branch.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r pipeline/requirements.txt

      - name: Install Node dependencies
        shell: bash
        run: |
          set -euxo pipefail
          npm ci --prefix pipeline

      - name: Install Playwright browser
        shell: bash
        run: |
          set -euxo pipefail
          npx --prefix pipeline playwright install --with-deps chromium

      - name: Validate automation settings
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          PIPELINE_REMOTE: origin
          PIPELINE_DATA_BRANCH: data-updates
          PIPELINE_MAIN_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pipeline.pipeline_env import load_automation_settings

          settings = load_automation_settings()
          print("Automation settings validated successfully.")
          print(f"drive_folder_id present: {bool(settings.drive_folder_id)}")
          print(f"remote: {settings.remote}")
          print(f"data_branch: {settings.data_branch}")
          print(f"main_branch: {settings.main_branch}")
          print(
              "service_account client_email present: "
              f"{bool(str(settings.service_account_payload.get('client_email', '')).strip())}"
          )
          print(
              "service_account project_id present: "
              f"{bool(str(settings.service_account_payload.get('project_id', '')).strip())}"
          )
          PY

      - name: Syntax checks
        shell: bash
        run: |
          set -euxo pipefail
          python -m py_compile \
            pipeline/pipeline_common.py \
            pipeline/pipeline_env.py \
            pipeline/prepare_publish_branch.py \
            pipeline/backfill_processed_drive_workbooks.py \
            pipeline/import-google-drive-folder.py \
            pipeline/extract_input_csv.py \
            pipeline/rebuild_event_matchup_data.py \
            pipeline/publish_pipeline_changes.py \
            pipeline/discord_notify.py \
            pipeline/sync_drive_and_rebuild_all.py \
            pipeline/run_github_action_pipeline.py
          node --check pipeline/build-matchup-split-data.mjs
          node --check pipeline/build-normalized-dataset.mjs
          node --check pipeline/build-precalculated-elo.mjs
          node --check pipeline/update-thumbnail.mjs

      - name: Print workflow context
        if: ${{ inputs.run_inspect }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          PIPELINE_REMOTE: origin
          PIPELINE_DATA_BRANCH: data-updates
          PIPELINE_MAIN_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euxo pipefail
          echo "Running inspect phase"
          echo "run_sync=${{ inputs.run_sync }}"
          echo "run_full_rebuild=${{ inputs.run_full_rebuild }}"
          echo "run_publish=${{ inputs.run_publish }}"
          echo "run_discord_notification=${{ inputs.run_discord_notification }}"
          echo "max_workbooks=${{ inputs.max_workbooks }}"
          echo "drive_list_command=${{ inputs.drive_list_command }}"
          echo "local_list_command=${{ inputs.local_list_command }}"
          ls -la pipeline
          python - <<'PY'
          from pipeline.pipeline_env import load_automation_settings

          settings = load_automation_settings()
          print("Workflow will run through pipeline/run_github_action_pipeline.py")
          print(f"Resolved remote: {settings.remote}")
          print(f"Resolved data branch: {settings.data_branch}")
          print(f"Resolved main branch: {settings.main_branch}")
          PY

      - name: Run Drive inspect
        if: ${{ inputs.run_inspect }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          PIPELINE_REMOTE: origin
          PIPELINE_DATA_BRANCH: data-updates
          PIPELINE_MAIN_BRANCH: ${{ github.event.repository.default_branch }}
          PIPELINE_COMMAND: ${{ inputs.drive_list_command }}
        shell: bash
        run: |
          set -euxo pipefail
          python pipeline/run_github_action_pipeline.py

      - name: Run local inspect
        if: ${{ inputs.run_inspect }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          PIPELINE_REMOTE: origin
          PIPELINE_DATA_BRANCH: data-updates
          PIPELINE_MAIN_BRANCH: ${{ github.event.repository.default_branch }}
          PIPELINE_COMMAND: ${{ inputs.local_list_command }}
        shell: bash
        run: |
          set -euxo pipefail
          python pipeline/run_github_action_pipeline.py

      - name: Run full manifest sync
        if: ${{ github.event_name == 'schedule' || inputs.run_sync || (inputs.run_publish && !inputs.run_full_rebuild) }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          PIPELINE_REMOTE: origin
          PIPELINE_DATA_BRANCH: data-updates
          PIPELINE_MAIN_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euxo pipefail
          LIMIT_ARG=""
          if [ -n "${{ inputs.max_workbooks }}" ]; then
            LIMIT_ARG=" --limit ${{ inputs.max_workbooks }}"
          fi
          export PIPELINE_COMMAND="sync --yes --skip-publish${LIMIT_ARG}"
          python pipeline/run_github_action_pipeline.py

      - name: Run full local rebuild
        if: ${{ inputs.run_full_rebuild }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          PIPELINE_REMOTE: origin
          PIPELINE_DATA_BRANCH: data-updates
          PIPELINE_MAIN_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euxo pipefail
          LIMIT_ARG=""
          if [ -n "${{ inputs.max_workbooks }}" ]; then
            LIMIT_ARG=" --limit ${{ inputs.max_workbooks }}"
          fi
          export PIPELINE_COMMAND="rebuild --full${LIMIT_ARG}"
          python pipeline/run_github_action_pipeline.py

      - name: Print rebuild outputs
        if: ${{ github.event_name == 'schedule' || inputs.run_sync || inputs.run_full_rebuild || inputs.run_publish }}
        shell: bash
        run: |
          set -euxo pipefail
          test -f pipeline/pipeline-state.json && cat pipeline/pipeline-state.json || echo "No pipeline-state.json"
          test -f pipeline/pipeline-run-summary.json && cat pipeline/pipeline-run-summary.json || echo "No pipeline-run-summary.json"
          test -f data/import-summary.json && cat data/import-summary.json || echo "No data/import-summary.json"
          test -f data/events.json && python - <<'PY'
          import json
          from pathlib import Path
          rows = json.loads(Path("data/events.json").read_text(encoding="utf-8"))
          print(f"events.json rows: {len(rows)}")
          for row in rows[-3:]:
              print(row)
          PY
          test -f data/results.json && python - <<'PY'
          import json
          from pathlib import Path
          rows = json.loads(Path("data/results.json").read_text(encoding="utf-8"))
          print(f"results.json rows: {len(rows)}")
          for row in rows[-3:]:
              print(row)
          PY
          find dataGoogleDrive -maxdepth 4 -type f | sort | tail -n 50 || true
          echo "Inspectable extracted Input-sheet CSVs written for debug review only:"
          find pipeline/output/extracted-csv -maxdepth 5 -type f | sort | tail -n 50 || true
          find data/matchups -maxdepth 2 -type f | sort || true
          test -f data/matchups/manifest.json && cat data/matchups/manifest.json || true
          find data/precalculated-elo -maxdepth 3 -type f | sort || true
          test -f data/precalculated-elo/meta.json && cat data/precalculated-elo/meta.json || true

      - name: Debug manifest and git status after sync
        if: ${{ github.event_name == 'schedule' || inputs.run_publish }}
        shell: bash
        run: |
          set -euxo pipefail
          echo "Manifest after sync:"
          cat pipeline/processed-drive-workbooks.json || true
          echo "Git status after sync:"
          git status --short

      - name: Configure git identity
        if: ${{ github.event_name == 'schedule' || inputs.run_publish }}
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Debug publish script version
        run: |
          set -euxo pipefail
          grep -n "INDEX_COMMIT_PATH\|THUMBNAIL_COMMIT_PATH\|commit_paths" pipeline/publish_pipeline_changes.py || true
          git branch --show-current
          git log -1 --oneline

      - name: Publish generated changes
        id: publish
        if: ${{ github.event_name == 'schedule' || inputs.run_publish }}
        shell: bash
        run: |
          set -euxo pipefail
          python pipeline/publish_pipeline_changes.py

      - name: Discord notification
        if: ${{ steps.publish.outcome == 'success' && (github.event_name == 'schedule' || inputs.run_discord_notification) }}
        shell: bash
        env:
          DISCORD_WEBHOOK_1: ${{ secrets.DISCORD_WEBHOOK_1 }}
          DISCORD_WEBHOOK_2: ${{ secrets.DISCORD_WEBHOOK_2 }}
          DISCORD_WEBHOOK_3: ${{ secrets.DISCORD_WEBHOOK_3 }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          PIPELINE_STATE_PATH: pipeline/pipeline-state.json
        run: |
          set -euxo pipefail
          echo "Running Discord notification step"
          echo "DISCORD_WEBHOOK_1 configured: $([ -n "${DISCORD_WEBHOOK_1:-}" ] && echo yes || echo no)"
          echo "DISCORD_WEBHOOK_2 configured: $([ -n "${DISCORD_WEBHOOK_2:-}" ] && echo yes || echo no)"
          echo "DISCORD_WEBHOOK_3 configured: $([ -n "${DISCORD_WEBHOOK_3:-}" ] && echo yes || echo no)"

          if [ -z "${DISCORD_WEBHOOK_1:-}" ] && [ -z "${DISCORD_WEBHOOK_2:-}" ] && [ -z "${DISCORD_WEBHOOK_3:-}" ]; then
            echo "Skipping Discord notification because no webhook secrets are configured."
            exit 0
          fi

          if python pipeline/discord_notify.py; then
            echo "Discord notification step completed successfully."
          else
            status=$?
            echo "Discord notification failed with exit code ${status}, but the workflow will continue."
            exit 0
          fi

      - name: Upload debug artifacts
        if: ${{ failure() || inputs.upload_debug_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug-artifacts
          path: |
            pipeline/pipeline-state.json
            pipeline/pipeline-run-summary.json
            data/import-summary.json
            pipeline/output/
          if-no-files-found: ignore
          retention-days: 7
