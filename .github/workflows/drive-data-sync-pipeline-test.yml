name: Drive Data Sync Pipeline Test

on:
  push:
    branches:
      - test/drive-pipeline
  workflow_dispatch:
    inputs:
      drive_list_command:
        description: Safe list command for Drive inspection
        required: false
        default: list --drive --limit 10
      local_list_command:
        description: Safe list command for local archive inspection
        required: false
        default: list --latest --limit 10
      download_command:
        description: Optional download command without rebuild or publish
        required: false
        default: ""
      run_extract:
        description: Run extract_input_csv.py after download
        required: false
        type: boolean
        default: false
      run_rebuild:
        description: Run rebuild_event_matchup_data.py after extract
        required: false
        type: boolean
        default: false
      full_rebuild_online:
        description: Use --full-rebuild-online with the rebuild step
        required: false
        type: boolean
        default: false
      run_matchup_split:
        description: Run build-matchup-split-data.mjs
        required: false
        type: boolean
        default: false
      run_elo_build:
        description: Run build-elo-data.mjs
        required: false
        type: boolean
        default: false
      run_discord_log:
        description: Build the Discord log without posting
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: drive-data-sync-pipeline-test
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Print workflow inputs
        shell: bash
        run: |
          set -euxo pipefail
          echo "Workflow: Drive Data Sync Pipeline Test"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "drive_list_command=${{ inputs.drive_list_command }}"
          echo "local_list_command=${{ inputs.local_list_command }}"
          echo "download_command=${{ inputs.download_command }}"
          echo "run_extract=${{ inputs.run_extract }}"
          echo "run_rebuild=${{ inputs.run_rebuild }}"
          echo "full_rebuild_online=${{ inputs.full_rebuild_online }}"
          echo "run_matchup_split=${{ inputs.run_matchup_split }}"
          echo "run_elo_build=${{ inputs.run_elo_build }}"
          echo "run_discord_log=${{ inputs.run_discord_log }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r scripts/automatedpipeline/requirements.txt
          python --version
          python -m pip list

      - name: Install Node dependencies
        shell: bash
        run: |
          set -euxo pipefail
          npm ci --prefix scripts
          npm --prefix scripts ls --depth=0

      - name: Install Playwright browser
        shell: bash
        run: |
          set -euxo pipefail
          npx --prefix scripts playwright install --with-deps chromium

      - name: Print secret presence
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          DISCORD_WEBHOOKS: ${{ secrets.DISCORD_WEBHOOKS }}
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          import json
          import os

          service_account = os.environ.get("GOOGLE_SERVICE_ACCOUNT_JSON", "").strip()
          drive_folder_id = os.environ.get("GOOGLE_DRIVE_FOLDER_ID", "").strip()
          discord_webhooks = [line.strip() for line in os.environ.get("DISCORD_WEBHOOKS", "").splitlines() if line.strip()]

          print(f"GOOGLE_SERVICE_ACCOUNT_JSON present: {bool(service_account)}")
          print(f"GOOGLE_DRIVE_FOLDER_ID present: {bool(drive_folder_id)}")
          print(f"DISCORD_WEBHOOKS count: {len(discord_webhooks)}")

          if not service_account:
              raise SystemExit("Missing GOOGLE_SERVICE_ACCOUNT_JSON secret.")
          if not drive_folder_id:
              raise SystemExit("Missing GOOGLE_DRIVE_FOLDER_ID secret.")

          payload = json.loads(service_account)
          print("Service account JSON parsed successfully.")
          print(f"Service account client_email present: {bool(str(payload.get('client_email', '')).strip())}")
          print(f"Service account project_id present: {bool(str(payload.get('project_id', '')).strip())}")
          print(f"Drive folder id length: {len(drive_folder_id)}")
          PY

      - name: Print repository layout
        shell: bash
        run: |
          set -euxo pipefail
          pwd
          ls -la
          ls -la .github/workflows
          ls -la scripts/automatedpipeline
          find scripts/automatedpipeline -maxdepth 2 -type f | sort

      - name: Write temporary automated pipeline config
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          DISCORD_WEBHOOKS: ${{ secrets.DISCORD_WEBHOOKS }}
          PIPELINE_REMOTE: origin
          PIPELINE_DATA_BRANCH: data-updates
          PIPELINE_MAIN_BRANCH: ${{ github.event.repository.default_branch }}
          PIPELINE_COMMIT_MESSAGE_TEMPLATE: "chore(data): import {workbook_name}"
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          pipeline_root = Path("scripts/automatedpipeline")
          pipeline_root.mkdir(parents=True, exist_ok=True)

          service_account_path = pipeline_root / "github-actions-service-account.json"
          service_account_payload = json.loads(os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"])
          service_account_path.write_text(
              json.dumps(service_account_payload, indent=2) + "\n",
              encoding="utf-8",
          )

          webhook_urls = [
              line.strip()
              for line in os.environ.get("DISCORD_WEBHOOKS", "").splitlines()
              if line.strip()
          ]

          config_payload = {
              "credentials_path": str(service_account_path.resolve()),
              "drive_folder_id": os.environ["GOOGLE_DRIVE_FOLDER_ID"].strip(),
              "remote": os.environ.get("PIPELINE_REMOTE", "origin").strip() or "origin",
              "data_branch": os.environ.get("PIPELINE_DATA_BRANCH", "data-updates").strip() or "data-updates",
              "main_branch": os.environ.get("PIPELINE_MAIN_BRANCH", "main").strip() or "main",
              "commit_message_template": os.environ.get(
                  "PIPELINE_COMMIT_MESSAGE_TEMPLATE",
                  "chore(data): import {workbook_name}",
              ),
              "discord_webhook_urls": webhook_urls,
              "discord_log_path": "./output/discord-data-update-log.json",
          }

          config_path = pipeline_root / "pipeline-config.json"
          config_path.write_text(json.dumps(config_payload, indent=2) + "\n", encoding="utf-8")
          print(f"Config written: {config_path.resolve()}")
          print(config_path.read_text(encoding="utf-8"))
          PY

      - name: Print current automated pipeline files
        shell: bash
        run: |
          set -euxo pipefail
          echo "pipeline-config.json"
          cat scripts/automatedpipeline/pipeline-config.json
          echo "pipeline-state.json exists?"
          test -f scripts/automatedpipeline/pipeline-state.json && cat scripts/automatedpipeline/pipeline-state.json || echo "No pipeline-state.json yet"
          echo "pipeline-overrides.json exists?"
          test -f scripts/automatedpipeline/pipeline-overrides.json && cat scripts/automatedpipeline/pipeline-overrides.json || echo "No pipeline-overrides.json yet"

      - name: Python syntax check for standalone automation
        shell: bash
        run: |
          set -euxo pipefail
          python -m py_compile \
            scripts/automatedpipeline/pipeline_common.py \
            scripts/automatedpipeline/pipeline_env.py \
            scripts/automatedpipeline/import-google-drive-folder.py \
            scripts/automatedpipeline/extract_input_csv.py \
            scripts/automatedpipeline/rebuild_event_matchup_data.py \
            scripts/automatedpipeline/build_discord_update_log.py \
            scripts/automatedpipeline/publish_pipeline_changes.py \
            scripts/automatedpipeline/sync_drive_and_rebuild_all.py \
            scripts/automatedpipeline/run_github_action_pipeline.py

      - name: Node syntax check for standalone automation
        shell: bash
        run: |
          set -euxo pipefail
          node --check scripts/automatedpipeline/build-matchup-split-data.mjs
          node --check scripts/automatedpipeline/build-elo-data.mjs
          node --check scripts/update-thumbnail.mjs

      - name: Run Drive list command
        env:
          PIPELINE_ARGS: ${{ inputs.drive_list_command }}
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          import os
          import shlex
          import subprocess
          import sys

          args = shlex.split(os.environ["PIPELINE_ARGS"])
          print(f"Running standalone command: {args}")
          subprocess.run(
              [sys.executable, "scripts/automatedpipeline/sync_drive_and_rebuild_all.py", *args],
              check=True,
          )
          PY

      - name: Run local list command
        env:
          PIPELINE_ARGS: ${{ inputs.local_list_command }}
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          import os
          import shlex
          import subprocess
          import sys

          args = shlex.split(os.environ["PIPELINE_ARGS"])
          print(f"Running standalone command: {args}")
          subprocess.run(
              [sys.executable, "scripts/automatedpipeline/sync_drive_and_rebuild_all.py", *args],
              check=True,
          )
          PY

      - name: Run optional download command
        if: ${{ inputs.download_command != '' }}
        env:
          PIPELINE_ARGS: ${{ inputs.download_command }}
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          import os
          import shlex
          import subprocess
          import sys

          args = shlex.split(os.environ["PIPELINE_ARGS"])
          print(f"Running standalone command: {args}")
          if not args or args[0] != "download":
              raise SystemExit("This test workflow only allows the optional command to start with 'download'.")
          subprocess.run(
              [sys.executable, "scripts/automatedpipeline/sync_drive_and_rebuild_all.py", *args],
              check=True,
          )
          PY

      - name: Print state after download
        shell: bash
        run: |
          set -euxo pipefail
          test -f scripts/automatedpipeline/pipeline-state.json && cat scripts/automatedpipeline/pipeline-state.json || echo "No pipeline-state.json yet"
          test -f scripts/automatedpipeline/pipeline-run-summary.json && cat scripts/automatedpipeline/pipeline-run-summary.json || echo "No pipeline-run-summary.json yet"
          find dataGoogleDrive -maxdepth 4 -type f | sort | tail -n 50 || true

      - name: Run extract step
        if: ${{ inputs.run_extract }}
        shell: bash
        run: |
          set -euxo pipefail
          python scripts/automatedpipeline/extract_input_csv.py

      - name: Print extracted CSV output
        if: ${{ inputs.run_extract }}
        shell: bash
        run: |
          set -euxo pipefail
          test -f scripts/automatedpipeline/pipeline-state.json && cat scripts/automatedpipeline/pipeline-state.json || true
          find scripts/automatedpipeline/output/extracted-csv -maxdepth 5 -type f | sort | tail -n 50 || true

      - name: Run rebuild step
        if: ${{ inputs.run_rebuild && !inputs.full_rebuild_online }}
        shell: bash
        run: |
          set -euxo pipefail
          python scripts/automatedpipeline/rebuild_event_matchup_data.py

      - name: Run full rebuild step
        if: ${{ inputs.run_rebuild && inputs.full_rebuild_online }}
        shell: bash
        run: |
          set -euxo pipefail
          python scripts/automatedpipeline/rebuild_event_matchup_data.py --full-rebuild-online

      - name: Print rebuild outputs
        if: ${{ inputs.run_rebuild }}
        shell: bash
        run: |
          set -euxo pipefail
          test -f data/import-summary.json && cat data/import-summary.json || echo "No data/import-summary.json yet"
          test -f data/events.json && python - <<'PY'
          import json
          from pathlib import Path
          path = Path("data/events.json")
          rows = json.loads(path.read_text(encoding="utf-8"))
          print(f"events.json rows: {len(rows)}")
          print("last rows preview:")
          for row in rows[-3:]:
              print(row)
          PY
          test -f data/results.json && python - <<'PY'
          import json
          from pathlib import Path
          path = Path("data/results.json")
          rows = json.loads(path.read_text(encoding="utf-8"))
          print(f"results.json rows: {len(rows)}")
          print("last rows preview:")
          for row in rows[-3:]:
              print(row)
          PY
          find data/matchups -maxdepth 2 -type f | sort || true

      - name: Run matchup split builder
        if: ${{ inputs.run_matchup_split }}
        shell: bash
        run: |
          set -euxo pipefail
          node scripts/automatedpipeline/build-matchup-split-data.mjs

      - name: Run Elo builder
        if: ${{ inputs.run_elo_build }}
        shell: bash
        run: |
          set -euxo pipefail
          node scripts/automatedpipeline/build-elo-data.mjs

      - name: Print matchup and Elo outputs
        if: ${{ inputs.run_matchup_split || inputs.run_elo_build }}
        shell: bash
        run: |
          set -euxo pipefail
          find data/matchups -maxdepth 2 -type f | sort || true
          find data/elo-data -maxdepth 2 -type f | sort || true
          test -f data/matchups/manifest.json && cat data/matchups/manifest.json || true
          test -f data/elo-data/manifest.js && cat data/elo-data/manifest.js || true

      - name: Build Discord log without posting
        if: ${{ inputs.run_discord_log }}
        shell: bash
        run: |
          set -euxo pipefail
          python scripts/automatedpipeline/build_discord_update_log.py

      - name: Print Discord log output
        if: ${{ inputs.run_discord_log }}
        shell: bash
        run: |
          set -euxo pipefail
          test -f scripts/automatedpipeline/output/discord-data-update-log.json && cat scripts/automatedpipeline/output/discord-data-update-log.json || echo "No discord log generated"

      - name: Final debug snapshot
        if: ${{ always() }}
        shell: bash
        run: |
          set -euxo pipefail
          echo "Final repository snapshot"
          find scripts/automatedpipeline -maxdepth 2 -type f | sort
          echo "Git status"
          git status --short || true
