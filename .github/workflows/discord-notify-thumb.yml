name: Notify Discord on push

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'data/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Wait for GitHub Pages build for this commit
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          expected_commit = os.environ["GITHUB_SHA"]
          token = os.environ["GITHUB_TOKEN"]
          url = f"https://api.github.com/repos/{repository}/pages/builds/latest"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "pauper-dashboard-discord-notify",
          }

          timeout_seconds = 20 * 60
          poll_interval_seconds = 10
          deadline = time.time() + timeout_seconds
          last_summary = None

          while time.time() < deadline:
              request = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = json.load(response)
              except urllib.error.HTTPError as exc:
                  details = exc.read().decode("utf-8", errors="replace")
                  raise SystemExit(f"GitHub Pages status request failed: HTTP {exc.code} - {details}") from exc

              status = str(payload.get("status") or "").strip()
              commit = str(payload.get("commit") or "").strip()
              error_message = str((payload.get("error") or {}).get("message") or "").strip()
              summary = f"latest_pages_build_commit={commit or '<none>'} status={status or '<none>'}"

              if summary != last_summary:
                  print(summary)
                  last_summary = summary

              if commit == expected_commit and status == "built":
                  print("GitHub Pages build is complete for the pushed commit.")
                  break

              if commit == expected_commit and status in {"errored", "canceled"}:
                  message = error_message or f"GitHub Pages build ended with status '{status}'."
                  raise SystemExit(message)

              time.sleep(poll_interval_seconds)
          else:
              raise SystemExit(
                  f"Timed out waiting for GitHub Pages to build commit {expected_commit}."
              )
          PY

      - name: Build Discord payload from aliases metadata
        shell: bash
        run: |
          python - <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path

          aliases_path = Path("data/aliases.json")
          if not aliases_path.exists():
              raise SystemExit(f"Aliases file not found: {aliases_path}")

          aliases = json.loads(aliases_path.read_text(encoding="utf-8"))
          event_type = str(aliases.get("last_updated_event_type") or "").strip()
          event_date = str(aliases.get("last_updated_event_date") or "").strip()

          if not event_type or not event_date:
              raise SystemExit("aliases.json is missing last_updated_event_type or last_updated_event_date.")

          try:
              formatted_date = datetime.strptime(event_date, "%Y-%m-%d").strftime("%d %B %Y")
          except ValueError as exc:
              raise SystemExit(f"Invalid last_updated_event_date in aliases.json: {event_date}") from exc

          if event_type.lower() == "challenge":
              message = (
                  f"Dashboard was updated with the {event_type} of {formatted_date}. "
                  f"\nData provided by Kirblinxy.\nhttps://fnpavel.github.io/pauperdata/"
              )
          else:
              message = (
                  f"Dashboard was updated with the {event_type} of {formatted_date}.\n"
                  f"https://fnpavel.github.io/pauperdata/"
              )

          payload = {
              "username": "Pauper Dashboard Updates",
              "content": message,
          }

          Path("payload.json").write_text(
              json.dumps(payload, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

      - name: Send message to Discord
        shell: bash
        run: |
          echo "$DISCORD_WEBHOOKS" | while IFS= read -r URL; do
            [ -z "$URL" ] && continue

            curl --fail \
                 -H "Content-Type: application/json" \
                 -d @payload.json \
                 "$URL"
          done
        env:
          DISCORD_WEBHOOKS: ${{ secrets.DISCORD_WEBHOOKS }}
