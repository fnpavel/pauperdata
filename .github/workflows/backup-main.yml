name: Backup main

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update backup-main from main
        shell: bash
        run: |
          set -euxo pipefail

          git fetch origin main

          MAIN_COMMIT="$(git rev-parse origin/main)"

          git branch -f backup-main "$MAIN_COMMIT"

          git push origin backup-main --force-with-lease

          echo "backup-main now points to $MAIN_COMMIT"