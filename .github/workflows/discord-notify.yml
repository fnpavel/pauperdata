name: Deploy Pages and Notify Discord

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_notify: ${{ steps.detect.outputs.should_notify }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect whether this push should notify Discord
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import fnmatch
          import os
          import subprocess

          event_name = os.environ["EVENT_NAME"]
          before_sha = os.environ.get("BEFORE_SHA", "").strip()
          current_sha = os.environ["CURRENT_SHA"]
          patterns = ["data/**"]

          if event_name == "workflow_dispatch":
              print("should_notify=true")
              raise SystemExit(0)

          if not before_sha or set(before_sha) == {"0"}:
              diff_command = ["git", "ls-tree", "-r", "--name-only", current_sha]
          else:
              diff_command = ["git", "diff", "--name-only", before_sha, current_sha]

          result = subprocess.run(
              diff_command,
              check=True,
              capture_output=True,
              text=True,
          )
          changed_files = [line.strip() for line in result.stdout.splitlines() if line.strip()]
          should_notify = any(
              fnmatch.fnmatch(path, pattern)
              for path in changed_files
              for pattern in patterns
          )

          print(f"should_notify={'true' if should_notify else 'false'}")
          PY

  deploy:
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R css _site/
          cp -R data _site/
          cp -R js _site/
          cp index.html _site/
          cp favicon.svg _site/
          cp thumbnail.png _site/
          touch _site/.nojekyll
          if [ -f CNAME ]; then cp CNAME _site/; fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    runs-on: ubuntu-latest
    needs: [changes, deploy]
    if: ${{ needs.changes.outputs.should_notify == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read thumbnail version from index.html
        id: thumbnail_version
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          from pathlib import Path

          html = Path("index.html").read_text(encoding="utf-8")
          match = re.search(r'thumbnail\.png\?v=([^"]+)', html)
          if not match:
              raise SystemExit("Could not find thumbnail version in index.html.")

          print(f"version={match.group(1).strip()}")
          PY

      - name: Wait for live site to serve the new thumbnail version
        shell: bash
        env:
          THUMBNAIL_VERSION: ${{ steps.thumbnail_version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import time
          import urllib.error
          import urllib.request

          version = os.environ["THUMBNAIL_VERSION"]
          expected_token = f"thumbnail.png?v={version}"
          expected_thumbnail_url = f"https://fnpavel.github.io/pauperdata/thumbnail.png?v={version}"
          index_url = "https://fnpavel.github.io/pauperdata/"
          deadline = time.time() + (10 * 60)

          def fetch_text(url: str) -> str:
              request = urllib.request.Request(
                  url,
                  headers={
                      "Cache-Control": "no-cache",
                      "Pragma": "no-cache",
                      "User-Agent": "pauper-dashboard-discord-notify",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return response.read().decode("utf-8", errors="replace")

          def fetch_status(url: str) -> int:
              request = urllib.request.Request(
                  url,
                  headers={
                      "Cache-Control": "no-cache",
                      "Pragma": "no-cache",
                      "User-Agent": "pauper-dashboard-discord-notify",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  response.read(1)
                  return response.status

          while time.time() < deadline:
              try:
                  index_html = fetch_text(index_url)
                  index_ready = expected_token in index_html
                  thumbnail_status = fetch_status(expected_thumbnail_url)
                  thumbnail_ready = thumbnail_status == 200
              except urllib.error.HTTPError as exc:
                  print(f"Live-site check not ready yet: HTTP {exc.code}")
              except urllib.error.URLError as exc:
                  print(f"Live-site check not ready yet: {exc}")
              else:
                  print(
                      f"live_index_has_version={index_ready} "
                      f"live_thumbnail_status={thumbnail_status}"
                  )
                  if index_ready and thumbnail_ready:
                      print("Live site is serving the expected thumbnail version.")
                      break

              time.sleep(10)
          else:
              raise SystemExit(
                  f"Timed out waiting for the live site to serve thumbnail version {version}."
              )
          PY

      - name: Build Discord payload from aliases metadata
        shell: bash
        env:
          THUMBNAIL_VERSION: ${{ steps.thumbnail_version.outputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime
          from pathlib import Path

          aliases_path = Path("data/aliases.json")
          if not aliases_path.exists():
              raise SystemExit(f"Aliases file not found: {aliases_path}")

          aliases = json.loads(aliases_path.read_text(encoding="utf-8"))
          event_type = str(aliases.get("last_updated_event_type") or "").strip()
          event_date = str(aliases.get("last_updated_event_date") or "").strip()

          if not event_type or not event_date:
              raise SystemExit("aliases.json is missing last_updated_event_type or last_updated_event_date.")

          try:
              formatted_date = datetime.strptime(event_date, "%Y-%m-%d").strftime("%d %B %Y")
          except ValueError as exc:
              raise SystemExit(f"Invalid last_updated_event_date in aliases.json: {event_date}") from exc

          thumbnail_version = str(os.environ.get("THUMBNAIL_VERSION") or "").strip()
          if not thumbnail_version:
              raise SystemExit("Missing THUMBNAIL_VERSION environment variable.")

          dashboard_url = f"https://fnpavel.github.io/pauperdata/?v={thumbnail_version}"

          if event_type.lower() == "challenge":
              message = (
                  f"Dashboard was updated with the {event_type} of {formatted_date}. "
                  f"\nData provided by Kirblinxy.\n{dashboard_url}"
              )
          else:
              message = (
                  f"Dashboard was updated with the {event_type} of {formatted_date}.\n"
                  f"{dashboard_url}"
              )

          payload = {
              "username": "Pauper Dashboard Updates",
              "content": message,
          }

          Path("payload.json").write_text(
              json.dumps(payload, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

      - name: Send message to Discord
        shell: bash
        env:
          DISCORD_WEBHOOK_1: ${{ secrets.DISCORD_WEBHOOK_1 }}
          DISCORD_WEBHOOK_2: ${{ secrets.DISCORD_WEBHOOK_2 }}
        run: |
          WEBHOOKS=(
            "$DISCORD_WEBHOOK_1"
            "$DISCORD_WEBHOOK_2"
          )

          for URL in "${WEBHOOKS[@]}"; do
            [ -z "$URL" ] && continue

            curl --fail \
                -H "Content-Type: application/json" \
                -d @payload.json \
                "$URL"
          done